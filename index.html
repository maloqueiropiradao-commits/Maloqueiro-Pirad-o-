<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animes Online</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0b0914; color: #fff; margin: 0; padding: 15px; }
        header { display: flex; align-items: center; justify-content: space-between; padding-bottom: 15px; border-bottom: 1px solid #141125; }
        .logo { font-size: 1.4rem; font-weight: 900; color: #bc3bfb; text-decoration: none; font-style: italic; }
        .box-busca { display: flex; align-items: center; background-color: #141125; border-radius: 4px; padding: 6px 10px; width: 100%; max-width: 220px; }
        .input-busca { background: none; border: none; color: white; outline: none; font-size: 0.9rem; width: 100%; }
        .btn-busca { background: none; border: none; color: #bc3bfb; font-size: 1.1rem; cursor: pointer; }
        
        .texto-resultado { font-size: 1.1rem; font-weight: bold; color: #fff; margin: 20px 0; display: none; }
        
        .grid-animes { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .card-anime { background-color: #110e1e; padding: 8px; border-radius: 6px; cursor: pointer; text-align: center; }
        .card-anime img { width: 100%; border-radius: 4px; object-fit: cover; height: 180px; }
        .anime-titulo { font-size: 0.95rem; font-weight: bold; margin-top: 8px; color: #fff; }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo" onclick="resetarHome()">Animes Online</a>
        <div class="box-busca">
            <input type="text" id="campoPesquisa" class="input-busca" placeholder="Buscar...">
            <button class="btn-busca" onclick="realizarBusca()"><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>
    </header>

    <!-- Texto idêntico ao do seu vídeo que aparece pós-busca -->
    <div id="mensagemBusca" class="texto-resultado"></div>

    <div id="containerAnimes" class="grid-animes">
        <!-- Os cards serão gerados dinamicamente via JS de forma limpa -->
    </div>

    <script>
        // Banco de dados compacto de teste
        const listaAnimes = [
            { nome: "Maloqueiro Piradão", img: "https://i.ibb.co/RT5Zkxr0/1782073076111.png" },
            { nome: "One Piece", img: "https://i.ibb.co/RT5Zkxr0/1782073076111.png" },
            { nome: "Darling in the Franxx", img: "https://i.ibb.co/RT5Zkxr0/1782073076111.png" }
        ];

        function renderizarAnimes(lista) {
            const container = document.getElementById('containerAnimes');
            container.innerHTML = "";
            lista.forEach(anime => {
                container.innerHTML += `
                    <div class="card-anime" onclick="alert('Abrindo: ${anime.nome}')">
                        <img src="${anime.img}">
                        <div class="anime-titulo">${anime.nome}</div>
                    </div>`;
            });
        }

        // Lógica da seta vermelha: captura a escrita e altera a tela igual ao vídeo
        function realizarBusca() {
            const termo = document.getElementById('campoPesquisa').value.trim();
            if (termo === "") return;

            const resultados = listaAnimes.filter(a => a.nome.toLowerCase().includes(termo.toLowerCase()));
            
            // Exibe a mensagem exata do vídeo
            const msgBox = document.getElementById('mensagemBusca');
            msgBox.innerText = `Você pesquisou por: ${termo}`;
            msgBox.style.display = "block";

            // Renderiza apenas o que foi encontrado
            renderizarAnimes(resultados);
        }

        function resetarHome() {
            document.getElementById('campoPesquisa').value = "";
            document.getElementById('mensagemBusca').style.display = "none";
            renderizarAnimes(listaAnimes);
        }

        // Inicializa a página com os animes na tela
        window.onload = () => renderizarAnimes(listaAnimes);
    </script>
</body>
</html>
