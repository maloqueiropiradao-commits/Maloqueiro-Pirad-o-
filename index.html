<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maloqueiro Piradão - Animes Online</title>
    <link rel="icon" href="https://i.ibb.co/zTXbHHxv/XRecorder-Edited-20260621-01.jpg" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0914;
            color: #fff;
            margin: 0;
            padding: 0;
            padding-bottom: 30px;
        }

        /* TOPO DO SITE IDENTICO À FOTO */
        header {
            background-color: #0d0a1b;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #1a1530;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-esquerda {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }
        .menu-btn {
            background: none;
            border: none;
            color: #8a63ff;
            font-size: 1.4rem;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
        }
        .logo-site {
            height: 32px;
            object-fit: contain;
        }
        .search-box {
            position: relative;
            display: flex;
            align-items: center;
        }
        .search-box input {
            background: #16122c;
            border: 1px solid #28214e;
            padding: 7px 35px 7px 15px;
            border-radius: 20px;
            color: white;
            outline: none;
            width: 140px;
            transition: width 0.3s;
            font-size: 0.85rem;
        }
        .search-box input:focus {
            width: 190px;
            border-color: #8a63ff;
        }
        .search-box i {
            position: absolute;
            right: 12px;
            color: #6c56c2;
            font-size: 0.9rem;
        }

        /* FILTRO ALFABÉTICO (A-Z) */
        .alphabet-filter {
            background: #090712;
            padding: 10px;
            display: flex;
            gap: 6px;
            overflow-x: auto;
            border-bottom: 1px solid #16122c;
            white-space: nowrap;
        }
        .alphabet-filter::-webkit-scrollbar {
            height: 3px;
        }
        .alphabet-filter::-webkit-scrollbar-thumb {
            background: #28214e;
            border-radius: 2px;
        }
        .alphabet-filter button {
            background: #16122c;
            border: 1px solid #28214e;
            color: #aaa;
            padding: 5px 10px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
            font-size: 0.8rem;
        }
        .alphabet-filter button:hover, .alphabet-filter button.active {
            background: #8a63ff;
            color: white;
            border-color: #8a63ff;
        }

        /* BANNER TOPO */
        .banner-container {
            width: 100%;
            max-width: 900px;
            margin: 12px auto 4px auto;
            padding: 0 10px;
            box-sizing: border-box;
        }
        .banner {
            width: 100%;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 10px;
            box-sizing: border-box;
        }

        /* SEÇÕES DE TÍTULO */
        .secao-titulo {
            text-align: left;
            color: #fff;
            border-left: 4px solid #8a63ff;
            padding-left: 10px;
            font-size: 1.15rem;
            margin: 20px 0 12px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn-ver-mais {
            background-color: #8a63ff;
            color: white;
            border: none;
            padding: 4px 10px;
            font-size: 0.7rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
        }

        /* GRID DE POSTS */
        .grid-destaques {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(135px, 1fr));
            gap: 12px;
        }
        .card-anime {
            background-color: #120e24;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: transform 0.2s;
            position: relative;
            text-align: left;
            border: 1px solid #1d173a;
        }
        .card-anime:hover { transform: scale(1.02); }
        .card-img-wrapper {
            position: relative;
            width: 100%;
            padding-top: 135%;
        }
        .card-img {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
        }
        .card-nota {
            position: absolute;
            bottom: 5px; right: 5px;
            background-color: rgba(0,0,0,0.85);
            color: #ffcc00;
            font-size: 0.7rem;
            font-weight: bold;
            padding: 2px 5px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 2px;
        }
        .card-titulo {
            padding: 8px;
            font-size: 0.85rem;
            font-weight: bold;
            color: #eee;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* DETALHES E EPISÓDIOS */
        #secaoDetalhes, #secaoPlayer { display: none; }
        .detalhes-topo {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            text-align: left;
            flex-wrap: wrap;
        }
        .detalhes-poster {
            width: 170px;
            border-radius: 6px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .detalhes-info { flex: 1; min-width: 250px; }
        .detalhes-titulo-principal { font-size: 1.6rem; color: #fff; margin: 0 0 8px 0; }
        .detalhes-ano { color: #aaa; font-size: 0.9rem; margin-bottom: 10px; }
        .detalhes-nota {
            background-color: #120e24;
            color: #ffcc00;
            display: inline-block;
            padding: 4px 10px;
            font-weight: bold;
            border-radius: 4px;
            font-size: 1rem;
            margin-bottom: 12px;
            border: 1px solid #28214e;
        }
        .detalhes-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
        .tag {
            background-color: #16122c;
            color: #bbb;
            padding: 3px 8px;
            font-size: 0.75rem;
            border-radius: 4px;
            border: 1px solid #28214e;
        }
        .detalhes-sinopse { font-size: 0.9rem; line-height: 1.5; color: #ccc; text-align: justify; }

        .titulo-lista-episodios {
            text-align: left;
            font-size: 1.15rem;
            font-weight: bold;
            color: #fff;
            margin: 25px 0 12px 0;
            border-left: 4px solid #8a63ff;
            padding-left: 10px;
        }

        /* LISTA DE EPISÓDIOS */
        .temporada-tab-container { display: flex; }
        .tab-temporada {
            background-color: #8a63ff;
            color: white;
            font-weight: bold;
            padding: 8px 16px;
            border-radius: 4px 4px 0 0;
            font-size: 0.9rem;
        }
        .ep-lista-bloco {
            background-color: #120e24;
            border-radius: 0 4px 4px 4px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            border: 1px solid #1d173a;
        }
        .ep-item {
            display: flex;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #16122c;
            cursor: pointer;
            transition: background 0.2s;
            text-align: left;
        }
        .ep-item:hover { background-color: #16122c; }
        .ep-capa-img {
            width: 95px;
            height: 54px;
            object-fit: cover;
            border-radius: 4px;
            margin-right: 12px;
            flex-shrink: 0;
            border: 1px solid #28214e;
        }
        .ep-details { flex: 1; }
        .ep-name { font-size: 0.95rem; font-weight: bold; color: #fff; margin-bottom: 2px; }
        .ep-date { font-size: 0.75rem; color: #aaa; }

        /* PLAYER DE VÍDEO */
        .video-wrapper {
            background-color: #120e24;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 6px 12px rgba(0,0,0,0.5);
            margin-top: 10px;
            border: 1px solid #1d173a;
        }
        .video-iframe-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background-color: #000;
        }
        .video-iframe-container iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: none;
        }
        .controls-nav { display: flex; background-color: #0d0a1b; border-top: 1px solid #16122c; }
        .nav-btn {
            flex: 1; padding: 12px; background: none; border: none;
            color: #fff; font-size: 1rem; cursor: pointer; transition: background 0.2s;
        }
        .nav-btn:hover { background-color: #16122c; }
        .nav-btn:disabled { color: #333; cursor: not-allowed; }
        .nav-center-line { border-left: 1px solid #16122c; border-right: 1px solid #16122c; }
        .video-info-box { padding: 12px; text-align: left; }
        .video-title { color: #ffcc00; font-size: 1.15rem; margin: 0 0 4px 0; }
        .video-date { color: #888; font-size: 0.8rem; }

        footer { text-align: center; padding: 20px; color: #444; font-size: 0.8rem; margin-top: 30px; }
    </style>
</head>
