<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maloqueiro Piradão - Animes Online</title>
    <link rel="icon" href="https://i.ibb.co/zTXbHHxv/XRecorder-Edited-20260621-01.jpg" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0914;
            color: #fff;
            margin: 0;
            padding: 0;
            padding-bottom: 30px;
        }

        /* TOPO DO SITE */
        header {
            background-color: #0d0a1b;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #1a1530;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-esquerda {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }
        .menu-btn {
            background: none;
            border: none;
            color: #8a63ff;
            font-size: 1.4rem;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
        }
        .logo-site {
            height: 32px;
            object-fit: contain;
        }
        
        /* BARRA DE BUSCA EXPANSÍVEL */
        .search-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .search-box {
            display: none;
            position: relative;
        }
        .search-box input {
            background: #16122c;
            border: 1px solid #28214e;
            padding: 7px 15px;
            border-radius: 20px;
            color: white;
            outline: none;
            width: 160px;
            font-size: 0.85rem;
        }
        .lupa-trigger {
            color: #8a63ff;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 5px;
        }

        /* MENU LATERAL */
        .sidebar {
            position: fixed;
            top: 0;
            left: -250px;
            width: 240px;
            height: 100%;
            background-color: #0d0a1b;
            box-shadow: 2px 0 10px rgba(0,0,0,0.5);
            z-index: 200;
            transition: left 0.3s ease;
            padding: 20px;
            box-sizing: border-box;
        }
        .sidebar.active { left: 0; }
        .sidebar h3 {
            color: #8a63ff;
            margin-top: 0;
            border-bottom: 1px solid #28214e;
            padding-bottom: 10px;
        }
        .sidebar button {
            display: block;
            width: 100%;
            background: #16122c;
            color: #fff;
            border: 1px solid #28214e;
            padding: 10px;
            text-align: left;
            margin-bottom: 8px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .sidebar button:hover, .sidebar button.active {
            background-color: #8a63ff;
            border-color: #8a63ff;
        }
        .sidebar-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 150;
            display: none;
        }

        /* FILTRO ALFABÉTICO */
        .alphabet-filter {
            background: #090712;
            padding: 10px;
            display: flex;
            gap: 6px;
            overflow-x: auto;
            border-bottom: 1px solid #16122c;
            white-space: nowrap;
        }
        .alphabet-filter button {
            background: #16122c;
            border: 1px solid #28214e;
            color: #aaa;
            padding: 5px 10px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
            font-size: 0.8rem;
        }
        .alphabet-filter button:hover, .alphabet-filter button.active {
            background: #8a63ff; color: white; border-color: #8a63ff;
        }

        .banner-container { width: 100%; max-width: 900px; margin: 12px auto 4px auto; padding: 0 10px; box-sizing: border-box; }
        .banner { width: 100%; border-radius: 8px; }
        .container { max-width: 900px; margin: 0 auto; padding: 10px; box-sizing: border-box; }

        /* SEÇÕES */
        .secao-titulo {
            text-align: left; color: #fff; border-left: 4px solid #8a63ff; padding-left: 10px;
            font-size: 1.15rem; margin: 20px 0 12px 0; display: flex; justify-content: space-between; align-items: center; font-weight: bold; text-transform: uppercase;
        }
        .btn-ver-mais { background-color: #8a63ff; color: white; border: none; padding: 4px 10px; font-size: 0.7rem; font-weight: bold; border-radius: 4px; cursor: pointer; }

        /* GRID E CARDS COM AVISO DE NOVO EPISÓDIO */
        .grid-destaques { display: grid; grid-template-columns: repeat(auto-fill, minmax(135px, 1fr)); gap: 12px; }
        .card-anime { background-color: #120e24; border-radius: 6px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.3); cursor: pointer; transition: transform 0.2s; border: 1px solid #1d173a; position: relative; }
        .card-anime:hover { transform: scale(1.02); }
        .card-img-wrapper { position: relative; width: 100%; padding-top: 135%; }
        .card-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        
        /* NOTA DO ANIME */
        .card-nota { position: absolute; bottom: 5px; right: 5px; background-color: rgba(0,0,0,0.85); color: #ffcc00; font-size: 0.7rem; font-weight: bold; padding: 2px 5px; border-radius: 4px; }
        
        /* AVISO DO EPISÓDIO LANÇADO (NOTIFICAÇÃO VISUAL) */
        .aviso-novo-ep {
            position: absolute;
            top: 5px;
            left: 5px;
            background: linear-gradient(45deg, #8a63ff, #6c56c2);
            color: white;
            font-size: 0.65rem;
            font-weight: bold;
            padding: 3px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            animation: piscarAviso 2s infinite;
            z-index: 10;
        }
        @keyframes piscarAviso {
            0% { opacity: 0.9; }
            50% { opacity: 1; transform: scale(1.03); }
            100% { opacity: 0.9; }
        }

        .card-titulo { padding: 8px; font-size: 0.85rem; font-weight: bold; color: #eee; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* INTERFACE DETALHES */
        #secaoDetalhes, #secaoPlayer { display: none; }
        .detalhes-topo { display: flex; gap: 20px; margin-bottom: 25px; text-align: left; flex-wrap: wrap; }
        .detalhes-poster { width: 170px; border-radius: 6px; }
        .detalhes-info { flex: 1; min-width: 250px; }
        .detalhes-titulo-principal { font-size: 1.6rem; color: #fff; margin: 0 0 8px 0; }
        .detalhes-nota { background-color: #120e24; color: #ffcc00; display: inline-block; padding: 4px 10px; font-weight: bold; border-radius: 4px; margin-bottom: 12px; border: 1px solid #28214e; }
        .detalhes-sinopse { font-size: 0.9rem; line-height: 1.5; color: #ccc; text-align: justify; }

        /* BOTÕES DE TEMPORADA VERMELHOS */
        .temporada-container { display: flex; gap: 10px; margin: 15px 0; flex-wrap: wrap; }
        .btn-temporada {
            background-color: #ce1616;
            color: white;
            border: none;
            padding: 8px 18px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-temporada:hover, .btn-temporada.active {
            background-color: #ff3333;
            box-shadow: 0 0 8px rgba(255, 0, 0, 0.6);
        }

        /* LISTA DE EPISÓDIOS */
        .ep-lista-bloco { background-color: #120e24; border-radius: 4px; overflow: hidden; border: 1px solid #1d173a; }
        .ep-item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #16122c; cursor: pointer; text-align: left; }
        .ep-item:hover { background-color: #16122c; }
        .ep-capa-img { width: 95px; height: 54px; object-fit: cover; border-radius: 4px; margin-right: 12px; flex-shrink: 0; }
        .ep-name { font-size: 0.95rem; font-weight: bold; color: #fff; }

        /* PLAYER DE VÍDEO */
        .video-wrapper { background-color: #120e24; border-radius: 10px; overflow: hidden; margin-top: 10px; border: 1px solid #1d173a; }
        .video-iframe-container { position: relative; width: 100%; padding-top: 56.25%; background-color: #000; }
        .video-iframe-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .controls-nav { display: flex; background-color: #0d0a1b; border-top: 1px solid #16122c; }
        .nav-btn { flex: 1; padding: 12px; background: none; border: none; color: #fff; font-size: 1rem; cursor: pointer; }
        .nav-btn:disabled { color: #333; cursor: not-allowed; }

        footer { text-align: center; padding: 20px; color: #444; font-size: 0.8rem; margin-top: 30px; }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
    <div class="sidebar" id="sidebar">

        <button onclick="filtrarAudio('Legendado', this)">Legendado 💬</button>
        <button onclick="filtrarAudio('Dublado', this)">Dublado 🇧🇷</button>
    </div>

    <header>
        <div class="header-esquerda" onclick="voltarParaHome()">
            <button class="menu-btn" onclick="event.stopPropagation(); toggleSidebar();"><i class="fa-solid fa-bars"></i></button>
            <img src="https://i.ibb.co/hFrhwNPv/1775870980776.png" alt="Logo" class="logo-site">
        </div>
        <div class="search-container">
            <div class="search-box" id="searchBox">
                <input type="text" id="searchInput" placeholder="Buscar episódios..." oninput="filtrarBusca()">

    <div class="container">

        <section id="secaoHome">

        <section id="secaoPlayer">
            <button class="btn-ver-mais" onclick="voltarParaDetalhes()" style="margin-bottom: 10px;"><i class="fa-solid fa-arrow-left"></i> Voltar</button>
            <div class="video-wrapper">

                    <iframe id="videoIframe" src="" allowfullscreen></iframe>
                </div>
                <div class="controls-nav">
                    <button class="nav-btn" id="prevBtn" onclick="navegarEp(-1)">◀ Anterior</button>
                    <button class="nav-btn" id="nextBtn" onclick="navegarEp(1)">Próximo ▶</button>
                </div>
            </div>
        </section>

        <section id="secaoDetalhes">
            <button class="btn-ver-mais" onclick="voltarParaHome()" style="margin-bottom: 15px;"><i class="fa-solid fa-arrow-left"></i> Voltar para Home</button>
            
            <div class="detalhes-topo">
                <img src="https://i.ibb.co/RT5Zkxr0/1782073076111.png" alt="Poster" class="detalhes-poster">
                <div class="detalhes-info">
                    <h2 class="detalhes-titulo-principal">Maloqueiro Piradão</h2>
                    <div class="detalhes-nota"><i class="fa-solid fa-star"></i> 10</div>
                    <p class="detalhes-sinopse">A Saga Insana da Tsunade Peidona... Aventuras divertidas criadas por Leonardo.</p>

            <div class="temporada-container">
                <button class="btn-temporada active" onclick="mudarTemporada(1, this)">1</button>
                <button class="btn-temporada" onclick="mudarTemporada(2, this)">2</button>
                <button class="btn-temporada" onclick="mudarTemporada(3, this)">3</button>
                <button class="btn-temporada" onclick="mudarTemporada(4, this)">4</button>

            <div class="ep-lista-bloco" id="listaEpisodiosContainer"></div>

    </div>

    <script>
        const listaAnimes = [
            {
                id: "maloqueiro",
                titulo: "Maloqueiro Piradão",
                nota: "★ 10",
                imagem: "https://i.ibb.co/RT5Zkxr0/1782073076111.png",
                letra: "M",
                audio: "Legendado",
                episodios: []
            }
        ];

        const urlsEps = [
            "sk38dxNjJxY","-hBlNzGUGIg","orECJ_S0S3Q","fPg26mBmDOg","y1iZJ0yKLog","Q9wx7co0_vs","QPvq4qTiq78","QN-apW9BKHY","TNW6z_fw-2s","fPPmk10cDp4",
            "7kDlpI1n9qw","EHnJP9b-YPY","Cm1wIsqO86o","l_3428W9fbM","wzidqo2d-t4","4FlsIEojkWc","e7Q98yrucGg","6F16VwPIp6Q","TjyKYQ7i8hU","LWDLNl7lvN0",
            "H62nZF7IdGU","v_5Dose5_bY","3Ow_m2wSljc","HsgapVTAsPg","-1D4VFxFjo8","FasB2gJfYMg","ZCJL_C3h1HY","fnvdC2Xw_mw","F-HBmb8EoHQ","DEGmJqYohAU",
            "39W4jFRxGd8","aL0_K8tIrWk","BerTOsindtc","84BcQGGkw_E","qHJRXw8ajKo","lU1bjkbJLPc","cKQGYVuYYLk","M4qap9ILVSI","lZooMFrmjYA","f6eJfGMUlgo"
        ];
        
        for(let i=1; i<=40; i++) {
            listaAnimes[0].episodios.push({
                id: i,
                titulo: `Episódio ${i}`,
                url: `https://www.youtube.com/embed/${urlsEps[i-1]}?autoplay=1`,
                capa: "https://i.ibb.co/RT5Zkxr0/1782073076111.png"
            });
        }

        let temporadaAtual = 1;
        let indexEpAtual = -1;

        window.addEventListener('DOMContentLoaded', () => {
            renderizarHome(listaAnimes);
        });

        function toggleSearch() {
            const box = document.getElementById('searchBox');
            box.style.display = (box.style.display === 'block') ? 'none' : 'block';
            if(box.style.display === 'block') document.getElementById('searchInput').focus();
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            const overlay = document.getElementById('sidebarOverlay');
            overlay.style.display = (overlay.style.display === 'block') ? 'none' : 'block';
        }

        function filtrarAudio(tipo, btn) {
            document.querySelectorAll('.sidebar button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const filtrados = (tipo === 'TODOS') ? listaAnimes : listaAnimes.filter(a => a.audio === tipo);
            renderizarHome(filtrados);
            toggleSidebar();
        }

        function renderizarHome(dados) {
            const gridHome = document.getElementById('containerGridHome');
            const gridUltimos = document.getElementById('containerGridUltimos');
            gridHome.innerHTML = ""; gridUltimos.innerHTML = "";

            if(dados.length === 0) {
                gridHome.innerHTML = "<p style='color:#aaa; padding:10px;'>Nenhum conteúdo correspondente.</p>";
                return;
            }

            dados.forEach(anime => {
                // Adicionado a div <div class="aviso-novo-ep">Novo Ep!</div> para destaque visual imediato
                gridHome.innerHTML += `
                    <div class="card-anime" onclick="abrirDetalhes()">
                        <div class="aviso-novo-ep">Novo Ep!</div>
                        <div class="card-img-wrapper"><img src="${anime.imagem}" class="card-img"><div class="card-nota">${anime.nota}</div></div>
                        <div class="card-titulo">${anime.titulo}</div>
                    </div>`;

                gridUltimos.innerHTML += `
                    <div class="card-anime" onclick="abrirDetalhes(); carregarEpisodio(39);">
                        <div class="aviso-novo-ep">Novo Ep!</div>
                        <div class="card-img-wrapper"><img src="${anime.imagem}" class="card-img"><div class="card-nota">Ep 40</div></div>
                        <div class="card-titulo">Episódio 40 Lançado!</div>
                    </div>`;
            });
        }

        function abrirDetalhes() {
            document.getElementById('secaoHome').style.display = 'none';
            document.getElementById('secaoDetalhes').style.display = 'block';
            renderizarListaEpisodios();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function mudarTemporada(num, btn) {
            document.querySelectorAll('.btn-temporada').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            temporadaAtual = num;
            renderizarListaEpisodios();
        }

        function renderizarListaEpisodios() {
            const container = document.getElementById('listaEpisodiosContainer');
            container.innerHTML = "";
            let inicio = (temporadaAtual - 1) * 10;
            let fim = inicio + 10;
            const eps = listaAnimes[0].episodios.slice(inicio, fim);

            eps.forEach((ep, idx) => {
                let indexReal = inicio + idx;
                container.innerHTML += `
                    <div class="ep-item" onclick="carregarEpisodio(${indexReal})">
                        <img src="${ep.capa}" class="ep-capa-img">
                        <div class="ep-name">${ep.titulo}</div>
                    </div>`;
            });
        }

        function carregarEpisodio(index) {
            indexEpAtual = index;
            const ep = listaAnimes[0].episodios[index];
            document.getElementById('secaoDetalhes').style.display = 'none';
            document.getElementById('secaoPlayer').style.display = 'block';
            document.getElementById('videoIframe').src = ep.url;
            document.getElementById('prevBtn').disabled = (index === 0);
            document.getElementById('nextBtn').disabled = (index === 39);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function navegarEp(direcao) {
            let novoIndex = indexEpAtual + direcao;
            if(novoIndex >= 0 && novoIndex < 40) carregarEpisodio(novoIndex);
        }

        function filtrarBusca() {
            const termo = document.getElementById('searchInput').value.toLowerCase();
            const filtrados = listaAnimes.filter(a => a.titulo.toLowerCase().includes(termo));
            renderizarHome(filtrados);
        }

        function voltarParaHome() {
            document.getElementById('secaoDetalhes').style.display = 'none';
            document.getElementById('secaoPlayer').style.display = 'none';
            document.getElementById('videoIframe').src = "";
            doc
