<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Maloqueiro Piradão</title>
    <style>
        body { background: #06040a; color: white; font-family: sans-serif; text-align: center; }
        .item-ep { background: #1a1a2e; padding: 20px; margin: 10px; border-radius: 8px; cursor: pointer; border: 1px solid #9d4edd; }
    </style>
</head>
<body>

    <h1>Maloqueiro Piradão</h1>
    <div id="listaDeEpisodios">
        <!-- Os episódios vão aparecer aqui sozinhos -->
    </div>

    <script>
        // Esta lista de episódios é o que vai aparecer no seu site
        const episdios = [
            "Episódio 1: O Começo",
            "Episódio 2: A Aventura",
            "Episódio 3: O Mistério",
            "Episódio 4: Final de Temporada"
        ];

        // Esse comando faz a lista aparecer na tela assim que o site abrir
        const container = document.getElementById('listaDeEpisodios');
        episdios.forEach(ep => {
            container.innerHTML += `<div class="item-ep">${ep}</div>`;
        });
    </script>
</body>
</html>
