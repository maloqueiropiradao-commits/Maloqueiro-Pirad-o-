<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maloqueiro Piradão - 28ª Temporada</title>
    <link rel="icon" href="https://i.ibb.co/zTXbHHxv/XRecorder-Edited-20260621-01.jpg" type="image/x-icon">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f0c1b;
            color: #fff;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        header {
            background-color: #1a162b;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }
        .banner-container {
            width: 100%;
            max-width: 1000px;
            margin: 20px auto;
            padding: 0 10px;
            box-sizing: border-box;
        }
        .banner {
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.6);
            display: block;
        }
        h1 {
            color: #ffcc00;
            margin-top: 10px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .content {
            max-width: 800px;
            margin: 30px auto;
            background-color: #1a162b;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .poster {
            width: 100%;
            max-width: 400px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }
        p {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #e0e0e0;
            margin: 0;
        }
        footer {
            margin-top: 5px;
            padding: 20px;
            background-color: #0b0914;
            color: #777;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <div class="banner-container">
            <img src="https://i.ibb.co/zH6Rcmjw/XRecorder-Edited-20260621-04.jpg" alt="Banner Maloqueiro Piradão" class="banner">
        </div>
        <h1>Maloqueiro Piradão</h1>
    </header>

    <div class="content">
        <img src="https://i.ibb.co/RT5Zkxr0/1782073076111.png" alt="Poster da Série" class="poster">
        <p>Prepare-se para a bombástica 28ª Temporada! Novas aventuras, muita diversão e reviravoltas imperdíveis estão chegando na série mais comentada do momento.</p>
    </div>

    <footer>
        &copy; 2026 Maloqueiro Piradão. Todos os direitos reservados.
    </footer>

</body>
</html>
