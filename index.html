
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maloqueiro Piradão Online</title>
    <link rel="icon" href="https://i.ibb.co/zTXbHHxv/XRecorder-Edited-20260621-01.jpg" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* CONFIGURAÇÕES GERAIS - TEMA EXTREME */
        :root {
            --roxo-principal: #9d4edd;
            --roxo-escuro: #5a189a;
            --roxo-brilhante: #e0aaff;
            --roxo-neon: #b5179e;
            --fundo-escuro: #06040a;
            --fundo-card: #0f0b18;
            --borda-roxa: rgba(157, 78, 221, 0.3);
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background-color: var(--fundo-escuro); 
            color: #fff; 
            margin: 0; 
            padding: 0; 
            padding-bottom: 40px; 
            -webkit-tap-highlight-color: transparent; 
        }

        /* EFEITO PULSE DO CLIQUE */
        .btn-roxo-complete, .menu-item-link, .card-episodio-home, .item-episodio, .btn-ver-mais {
            position: relative;
            overflow: hidden;
        }
        
        /* HEADER E LOGO */
        header { 
            background-color: rgba(6, 4, 10, 0.95); 
            padding: 15px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            gap: 10px; 
            border-bottom: 1px solid var(--borda-roxa);
            box-shadow: 0 4px 20px rgba(157, 78, 221, 0.1);
        }

        .btn-menu-linhas { 
            background: none; 
            border: none; 
            color: #fff; 
            font-size: 1.5rem; 
            cursor: pointer; 
            transition: transform 0.2s, color 0.2s;
        }
        .btn-menu-linhas:hover {
            color: var(--roxo-principal);
            transform: scale(1.1);
        }

        .logo-central-branding { 
            font-size: 1.35rem; 
            font-weight: 900; 
            color: var(--roxo-principal); 
            text-shadow: 0px 0px 12px var(--roxo-neon); 
            font-style: italic; 
            letter-spacing: 0.5px; 
            cursor: pointer; 
            white-space: nowrap; 
        }
        
        .container-busca-topo { 
            display: flex; 
            align-items: center; 
            background-color: var(--fundo-card); 
            border-radius: 8px; 
            padding: 6px 12px; 
            flex: 1; 
            max-width: 220px; 
            border: 1px solid var(--borda-roxa); 
        }
        .input-busca { background: none; border: none; color: white; outline: none; font-size: 0.95rem; width: 100%; }
        .btn-pesquisa-topo { background: none; border: none; color: var(--roxo-principal); font-size: 1.25rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .container { max-width: 900px; margin: 0 auto; padding: 15px; box-sizing: border-box; }
        
        /* MENU LATERAL ULTRA ROXO */
        .menu-lateral { 
            position: fixed; 
            top: 0; 
            left: -280px; 
            width: 280px; 
            height: 100%; 
            background-color: var(--fundo-escuro); 
            box-shadow: 4px 0 25px rgba(157, 78, 221, 0.25); 
            z-index: 200; 
            transition: left 0.3s cubic-bezier(0.77,0.2,0.05,1); 
            box-sizing: border-box; 
            padding: 20px 15px; 
            overflow-y: auto; 
            border-right: 1px solid var(--borda-roxa);
        }
        .menu-lateral.aberto { left: 0 !important; }
        .menu-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid var(--borda-roxa); padding-bottom: 10px; }
        .menu-seccao-titulo { font-size: 0.85rem; font-weight: 800; color: var(--roxo-brilhante); letter-spacing: 1.5px; margin: 20px 0 8px 10px; display: block; text-transform: uppercase; text-shadow: 0 0 5px var(--roxo-principal); }
        
        .menu-item-link { 
            display: flex; 
            align-items: center;
            color: #fff; 
            text-decoration: none; 
            font-size: 1.05rem; 
            font-weight: 600; 
            padding: 12px 14px; 
            border-radius: 6px; 
            cursor: pointer; 
            margin-bottom: 6px;
            border: 1px solid transparent;
            transition: all 0.2s ease;
        }
        .menu-item-link:hover { 
            background-color: var(--roxo-escuro); 
            color: #fff; 
            transform: translateY(-3px);
            border-color: var(--roxo-principal);
            box-shadow: 0 4px 12px rgba(157, 78, 221, 0.4);
        }
        .menu-item-link:active { background-color: var(--roxo-principal); transform: scale(0.98); }
        .overlay-menu { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 150; display: none; }
        
        /* GERENCIADOR DE TELAS */
        .secao-layout { display: none !important; }
        .secao-layout.ativa { display: block !important; }
        
        .bloco-header-titulo { display: flex; justify-content: space-between; align-items: center; margin: 25px 0 15px 0; }
        .titulo-decorado { font-size: 1.25rem; font-weight: bold; color: #fff; border-left: 4px solid var(--roxo-principal); padding-left: 10px; text-shadow: 0 0 10px rgba(157, 78, 221, 0.5); }
        
        /* BOTÃO VER MAIS / PADRÃO ROXO */
        .btn-ver-mais { 
            background-color: var(--roxo-principal); 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 6px; 
            font-weight: bold; 
            font-size: 0.85rem; 
            cursor: pointer; 
            box-shadow: 0 0 10px rgba(157, 78, 221, 0.4);
            transition: all 0.2s ease;
        }
        .btn-ver-mais:hover { 
            background-color: var(--roxo-brilhante); 
            color: var(--fundo-escuro);
            transform: translateY(-3px); 
            box-shadow: 0 6px 15px var(--roxo-principal);
        }
        .btn-ver-mais:active { background-color: var(--roxo-escuro); transform: scale(0.95); }
        
        /* POSTER PRINCIPAL */
        .container-poster-destaque { display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 20px 0; cursor: pointer; }
        .poster-principal-imagem { width: 210px; border-radius: 8px; border: 2px solid var(--roxo-principal); box-shadow: 0 0 20px rgba(157, 78, 221, 0.4); transition: transform 0.3s ease; }
        .container-poster-destaque:hover .poster-principal-imagem { transform: scale(1.05) translateY(-5px); box-shadow: 0 0 30px var(--roxo-neon); }
        .legenda-poster-clique { margin-top: 15px; font-size: 1.15rem; font-weight: bold; color: #fff; text-shadow: 0 0 5px var(--roxo-principal); }
        
        /* GRID DA HOME */
        .grid-ultimos-episodios { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 15px; }
        .card-episodio-home { 
            cursor: pointer; 
            display: flex; 
            flex-direction: column; 
            background-color: var(--fundo-card); 
            padding: 10px; 
            border-radius: 8px; 
            border: 1px solid var(--borda-roxa);
            transition: all 0.25s ease;
        }
        .card-episodio-home:hover { 
            transform: translateY(-5px); 
            border-color: var(--roxo-principal); 
            box-shadow: 0 6px 18px rgba(157, 78, 221, 0.3);
        }
        .thumb-wrapper-home { position: relative; width: 100%; padding-top: 56.25%; background-color: #000; border-radius: 6px; overflow: hidden; }
        .thumb-wrapper-home img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .tag-legendado-home { position: absolute; bottom: 6px; right: 6px; background-color: var(--roxo-principal); color: white; font-size: 0.65rem; font-weight: bold; padding: 3px 8px; border-radius: 4px; box-shadow: 0 0 8px var(--roxo-neon); }
        
        /* BLOCOS DE TEMPORADA / SELETORES */
        .bloco-seletor-temporada { display: flex; background-color: var(--fundo-card); margin-bottom: 3px; border-radius: 8px 8px 0 0; border: 1px solid var(--borda-roxa); border-bottom: none; }
        .numero-temporada-box { background-color: var(--roxo-principal); color: #fff; font-size: 1.5rem; font-weight: bold; width: 80px; display: flex; align-items: center; justify-content: center; padding: 12px 0; border-radius: 6px 0 0 0; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .texto-temporada-box { color: #fff; font-size: 1.1rem; display: flex; align-items: center; padding-left: 20px; flex: 1; font-weight: bold; }
        
        /* LISTA COMPLETA ESTILO STREAMING */
        .bloco-lista-completa { display: flex; flex-direction: column; background-color: var(--fundo-card); border-radius: 0 0 8px 8px; border: 1px solid var(--borda-roxa); overflow: hidden; max-height: 500px; overflow-y: auto; }
        .item-episodio { display: flex; align-items: center; padding: 14px 12px; border-bottom: 1px solid rgba(157, 78, 221, 0.1); cursor: pointer; gap: 15px; transition: all 0.2s; }
        .item-episodio:hover { background-color: rgba(157, 78, 221, 0.15); padding-left: 18px; }
        .capa-miniatura-ep { width: 90px; height: 52px; object-fit: cover; border-radius: 4px; border: 1px solid rgba(157, 78, 221, 0.2); }
        .ep-identificador { color: var(--roxo-brilhante); font-size: 0.95rem; font-weight: bold; min-width: 55px; text-shadow: 0 0 4px var(--roxo-principal); }
        .ep-divisor-vertical { width: 1px; height: 30px; background-color: var(--borda-roxa); }
        
        /* PLAYER DE VÍDEO EXTREME COM CONTROLES ROXOS CUSTOMIZADOS */
        .wrapper-video-player { position: relative; width: 100%; padding-top: 56.25%; background-color: #000; border-radius: 12px; overflow: hidden; margin-top: 15px; border: 2px solid var(--roxo-principal); box-shadow: 0 0 25px rgba(157, 78, 221, 0.3); }
        .wrapper-video-player iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        /* MENU INTERNO DA ENGRENAGEM */
        .container-menu-engrenagem {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 10;
        }
        .btn-engrenagem-player {
            background-color: rgba(6, 4, 10, 0.85);
            color: var(--roxo-principal);
            border: 1px solid var(--roxo-principal);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            font-size: 1.25rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 10px rgba(157, 78, 221, 0.4);
            transition: all 0.2s ease;
        }
        .btn-engrenagem-player:hover {
            color: var(--roxo-brilhante);
            background-color: var(--roxo-escuro);
            transform: rotate(45deg) scale(1.1);
        }
        .painel-ajustes-engrenagem {
            display: none;
            position: absolute;
            top: 50px;
            right: 0;
            background-color: rgba(15, 11, 24, 0.95);
            border: 2px solid var(--roxo-principal);
            border-radius: 8px;
            padding: 15px;
            width: 220px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.8);
        }
        .painel-ajustes-engrenagem.ativo { display: block; }
        .titulo-ajuste-grupo { font-size: 0.8rem; text-transform: uppercase; color: var(--roxo-brilhante); font-weight: bold; margin-bottom: 6px; letter-spacing: 0.5px; }
        .grid-botoes-config { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 12px; }
        
        /* BOTÕES INTERNOS DO SITE - TOTALMENTE ROXOS */
        .btn-roxo-complete {
            background-color: var(--roxo-principal);
            color: white;
            border: none;
            padding: 6px 4px;
            font-size: 0.75rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            text-align: center;
            transition: all 0.15s ease;
        }
        .btn-roxo-complete:hover {
            background-color: var(--roxo-brilhante);
            color: var(--fundo-escuro);
            transform: translateY(-2px);
        }
        .btn-roxo-complete:active {
            background-color: var(--roxo-escuro);
            transform: scale(0.95);
        }
        .btn-roxo-complete.selecionado {
            background-color: var(--roxo-neon);
            box-shadow: 0 0 8px #fff;
            border: 1px solid #fff;
        }

        /* NAVEGAÇÃO DO PLAYER (ANTERIOR/PRÓXIMO) */
        .botoes-navegacao-player { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; gap: 15px; }
        .btn-seta-roxa { 
            background-color: var(--roxo-principal); 
            color: #fff; 
            border: none; 
            padding: 12px 26px; 
            font-size: 1.05rem; 
            font-weight: bold; 
            border-radius: 8px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            box-shadow: 0 4px 12px rgba(157, 78, 221, 0.3);
            transition: all 0.2s ease;
        }
        .btn-seta-roxa:hover:not(:disabled) { 
            background-color: var(--roxo-brilhante); 
            color: var(--fundo-escuro);
            transform: translateY(-3px); 
            box-shadow: 0 6px 18px var(--roxo-principal);
        }
        .btn-seta-roxa:active:not(:disabled) { background-color: var(--roxo-escuro); transform: scale(0.96); }
        .btn-seta-roxa:disabled { background-color: #201a2e; color: #555; cursor: not-allowed; box-shadow: none; border: 1px solid #312747; }
        
        /* BOTÃO VOLTAR / SAIR */
        .btn-voltar-topo { 
            background: none; 
            border: 1px solid var(--borda-roxa); 
            background-color: var(--fundo-card);
            color: #fff; 
            font-size: 1rem; 
            cursor: pointer; 
            display: inline-flex; 
            align-items: center; 
            gap: 10px; 
            padding: 10px 18px;
            border-radius: 6px;
            margin-bottom: 20px; 
            font-weight: bold; 
            transition: all 0.2s;
        }
        .btn-voltar-topo:hover {
            background-color: var(--roxo-escuro);
            border-color: var(--roxo-principal);
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(157, 78, 221, 0.2);
        }
        .btn-voltar-topo i { color: var(--roxo-principal); }
        .btn-voltar-topo:hover i { color: var(--roxo-brilhante); }
    </style>
</head>
<body>

            <div class="bloco-lista-completa" id="listaDeEpisodiosContainer"></div>

        <!-- VIDEO PLAYER COMPLETO COM PAINEL ROXO DA ENGRENAGEM -->
