<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maloqueiro Piradão - Plataforma de Vídeos</title>
    <link rel="icon" href="https://i.ibb.co/zTXbHHxv/XRecorder-Edited-20260621-01.jpg" type="image/x-icon">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f0c1b;
            color: #fff;
            margin: 0;
            padding: 0;
        }

        /* TELA DE CARREGAMENTO (SPLASH SCREEN) */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #0b0914;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.6s ease;
        }
        .boneco-roxo {
            width: 120px;
            height: 120px;
            background-color: #8a2be2;
            border-radius: 20px;
            box-shadow: 0 0 20px #8a2be2;
            animation: rodarE_Pular 1.5s infinite ease-in-out;
        }
        .splash-texto {
            margin-top: 25px;
            color: #ffcc00;
            font-size: 1.4rem;
            font-weight: bold;
            letter-spacing: 2px;
        }
        @keyframes rodarE_Pular {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            30% { transform: translateY(-50px) rotate(180deg); }
            50% { transform: translateY(0) rotate(360deg); }
            75% { transform: translateY(-20px) rotate(180deg); }
        }

        /* INTERFACE E TOPO */
        header {
            background-color: #1a162b;
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            position: relative;
        }
        .menu-btn {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: white;
            font-size: 2rem;
            cursor: pointer;
        }
        .banner-container {
            width: 100%;
            max-width: 900px;
            margin: 10px auto;
        }
        .banner {
            width: 100%;
            border-radius: 12px;
        }
        h1 {
            color: #ffcc00;
            margin: 5px 0;
            font-size: 2rem;
        }

        /* CONTEÚDO PRINCIPAL */
        .container {
            max-width: 900px;
            margin: 20px auto;
            padding: 10px;
        }

        /* PLAYER DE VÍDEO COMPLETO (Baseado no print XRecorder_20260621_03.jpg) */
        .video-player-section {
            background-color: #1a162b;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0,0,0,0.6);
            margin-bottom: 25px;
            display: none; /* Inicia oculto até clicar em um ep */
        }
        .video-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* Proporção 16:9 */
            background-color: #000;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .controls-nav {
            display: flex;
            background-color: #110e1c;
            border-top: 2px solid #25203b;
        }
        .nav-btn {
            flex: 1;
            padding: 15px;
            background: none;
            border: none;
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .nav-btn:hover { background-color: #25203b; }
        .nav-btn:disabled { color: #444; cursor: not-allowed; }
        .nav-center-line { border-left: 1px solid #25203b; border-right: 1px solid #25203b; }

        .video-info-box {
            padding: 15px;
            text-align: left;
        }
        .video-title { color: #ffcc00; font-size: 1.5rem; margin: 0 0 5px 0; }
        .video-date { color: #888; font-size: 0.9rem; }

        /* LISTA ESTILIZADA DE EPISÓDIOS (Baseado no print XRecorder_20260619_03.jpg) */
        .section-title {
            text-align: left;
            color: #ffcc00;
            border-left: 4px solid #ffcc00;
            padding-left: 10px;
            font-size: 1.4rem;
            margin: 20px 0;
        }
        .temporada-header {
            background-color: #ffcc00;
            color: #000;
            font-weight: bold;
            padding: 12px;
            text-align: left;
            border-radius: 6px 6px 0 0;
            font-size: 1.1rem;
        }
        .ep-lista {
            background-color: #1a162b;
            border-radius: 0 0 6px 6px;
            overflow: hidden;
        }
        .ep-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #25203b;
            cursor: pointer;
            transition: background 0.2s;
            text-align: left;
        }
        .ep-item:hover { background-color: #25203b; }
        .ep-thumb-placeholder {
            width: 100px;
            height: 60px;
            background-color: #2b2640;
            border-radius: 4px;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            color: #ffcc00;
            font-weight: bold;
        }
        .ep-details { flex: 1; }
        .ep-name { font-size: 1.1rem; font-weight: bold; color: #fff; margin-bottom: 4px; }
        .ep-date { font-size: 0.85rem; color: #aaa; }

        /* TELA INICIAL COM O POSTER */
        .home-poster-section {
            background-color: #1a162b;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.6);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .home-poster-section:hover { transform: scale(1.01); }
        .poster-main { width: 100%; max-width: 450px; border-radius: 10px; }

        /* AVISO FLUTUANTE DE NOTIFICAÇÃO */
        .aviso-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #141124;
            border: 2px solid #ffcc00;
            border-radius: 15px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            z-index: 1000;
            width: 90%;
            max-width: 500px;
            box-sizing: border-box;
            animation: entrarAviso 0.6s ease-out forwards;
        }
        .aviso-container.subir-sumir { animation: sairAviso 0.6s ease-in forwards; }
        .aviso-personagem { width: 70px; height: 70px; object-fit: contain; }
        .aviso-conteudo { text-align: left; flex: 1; }
        .aviso-texto { font-size: 0.95rem; margin-bottom: 10px; }
        .aviso-botoes { display: flex; gap: 10px; }
        .btn-nao { background-color: #2b2640; color: #bbb; border: 1px solid #444; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
        .btn-sim { background-color: #ffcc00; color: #000; border: none; padding: 6px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }

        @keyframes entrarAviso { from { opacity: 0; transform: translate(-50%, 40px); } to { opacity: 1; transform: translate(-50%, 0); } }
        @keyframes sairAviso { from { opacity: 1; transform: translate(-50%, 0); } to { opacity: 0; transform: translate(-50%, 40px); } }

        footer { text-align: center; padding: 20px; color: #555; font-size: 0.85rem; margin-top: 30px; }
    </style>
</head>
<body>

    <!-- 6 SEGUNDOS DO BICHINHO ROXO RODANDO E PULANDO -->
    <div id="splash-screen">
        <div class="boneco-roxo"></div>
        <div class="splash-texto">MALOQUEIRO PIRADÃO</div>
    </div>

    <header>
        <button class="menu-btn" onclick="scrollToEpisodes()">☰</button>
        <div class="banner-container">
            <img src="https://i.ibb.co/zH6Rcmjw/XRecorder-Edited-20260621-04.jpg" alt="Banner" class="banner">
        </div>
        <h1>Maloqueiro Piradão</h1>
    </header>

    <div class="container">

        <!-- PLAYER COMPLETO DE EPISÓDIOS (OCULTO ATÉ O CLIQUE) -->
        <section class="video-player-section" id="playerSection">
            <div class="video-container">
                <iframe id="videoIframe" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
            <div class="controls-nav">
                <button class="nav-btn" id="prevBtn" onclick="navegarEp(-1)">◀ Voltar</button>
                <button class="nav-btn nav-center-line" onclick="scrollToEpisodes()">☰ Menu</button>
                <button class="nav-btn" id="nextBtn" onclick="navegarEp(1)">Avançar ▶</button>
            </div>
            <div class="video-info-box">
                <h3 class="video-title" id="playerTitle">Selecione um Episódio</h3>
                <div class="video-date" id="playerDate"></div>
            </div>
        </section>

        <!-- SEÇÃO INICIAL: POSTER PRINCIPAL -->
        <section class="home-poster-section" id="homePoster" onclick="scrollToEpisodes()">
            <img src="https://i.ibb.co/RT5Zkxr0/1782073076111.png" alt="Poster da Série" class="poster-main">
            <p style="font-size: 1.1rem; color: #ffcc00; font-weight: bold; margin-top: 15px;">👉 CLIQUE NO PÔSTER PARA VER A LISTA DE EPISÓDIOS!</p>
        </section>

        <!-- LISTA COMPLETA DE TEMPORADAS E EPISÓDIOS -->
        <h2 class="section-title" id="listaEpisodiosTitulo">Temporadas e Episódios</h2>
        <div class="temporada-header">Temporada 28</div>
        <div class="ep-lista" id="listaEpisodiosContainer">
            <!-- Gerado via JavaScript para manter tudo 100% integrado -->
        </div>

    </div>

    <!-- CAIXA DE AVISO POP-UP -->
    <div class="aviso-container" id="caixaAviso" style="display: none;">
        <img src="https://i.ibb.co/1GDwFdQr/1781890896358.png" alt="Personagem" class="aviso-personagem">
        <div class="aviso-conteudo">
            <div class="aviso-texto">E aí, meu povo! 😄 Quer ficar sabendo na hora quando sair episódio novo?</div>
            <div class="aviso-botoes">
                <button class="btn-nao" onclick="fecharAviso()">Não, valeu</button>
                <button class="btn-sim" onclick="fecharAviso('sim')">Ôxe, quero sim!</button>
            </div>
        </div>
    </div>

    <footer>&copy; 2026 Maloqueiro Piradão. Todos os direitos reservados.</footer>

    <script>
        // BANCO DE DADOS DOS 10 EPISÓDIOS DO YOUTUBE
        const episodios = [
            { id: 1, titulo: "Episódio 1", lancamento: "13 de Abril de 2024", url: "https://www.youtube.com/embed/sk38dxNjJxY?autoplay=1" },
            { id: 2, titulo: "Episódio 2", lancamento: "14 de Abril de 2024", url: "https://www.youtube.com/embed/EHnJP9b-YPY?autoplay=1" },
            { id: 3, titulo: "Episódio 3", lancamento: "15 de Abril de 2024", url: "https://www.youtube.com/embed/orECJ_S0S3Q?autoplay=1" },
            { id: 4, titulo: "Episódio 4", lancamento: "16 de Abril de 2024", url: "https://www.youtube.com/embed/fPg26mBmDOg?autoplay=1" },
            { id: 5, titulo: "Episódio 5", lancamento: "17 de Abril de 2024", url: "https://www.youtube.com/embed/y1iZJ0yKLog?autoplay=1" },
            { id: 6, titulo: "Episódio 6", lancamento: "18 de Abril de 2024", url: "https://www.youtube.com/embed/Q9wx7co0_vs?autoplay=1" },
            { id: 7, titulo: "Episódio 7", lancamento: "19 de Abril de 2024", url: "https://www.youtube.com/embed/QPvq4qTiq78?autoplay=1" },
            { id: 8, titulo: "Episódio 8", lancamento: "20 de Abril de 2024", url: "https://www.youtube.com/embed/QN-apW9BKHY?autoplay=1" },
            { id: 9, titulo: "Episódio 9", lancamento: "21 de Abril de 2024", url: "https://www.youtube.com/embed/TNW6z_fw-2s?autoplay=1" },
            { id: 10, titulo: "Episódio 10", lancamento: "23 de Abril de 2024", url: "https://www.youtube.com/embed/fPPmk10cDp4?autoplay=1" }
        ];

        let indexAtual = -1;

        // FECHAR TELA DE CARREGAMENTO APÓS 6 SEGUNDOS EXATOS
        window.addEventListener('DOMContentLoaded', () => {
            renderizarEpisodios();
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.style.display = 'none';
                    // Abre o seu pop-up de aviso logo após o carregamento terminar
                    document.getElementById('caixaAviso').style.display = 'flex';
                }, 600);
            }, 6000); // 6 segundos de animação
        });

        // MONTAR A LISTAGEM NA TELA
        function renderizarEpisodios() {
            const container = document.getElementById('listaEpisodiosContainer');
            container.innerHTML = "";
            episodios.forEach((ep, index) => {
                container.innerHTML += `
                    <div class="ep-item" onclick="carregarEpisodio(${index})">
                        <div class="ep-thumb-placeholder">EP - ${ep.id}</div>
                        <div class="ep-details">
                            <div class="ep-name">${ep.titulo}</div>
                            <div class="ep-date">Lançado em: ${ep.lancamento}</div>
                        </div>
                    </div>
                `;
            });
        }

        // FUNÇÃO PARA ATIVAR O VÍDEO NO PLAYER E RODAR COM AUTO-PLAY
        function carregarEpisodio(index) {
            indexAtual = index;
            const ep = episodios[index];

            document.getElementById('playerSection').style.display = 'block';
            document.getElementById('videoIframe').src = ep.url;
            document.getElementById('playerTitle').innerText = `Maloqueiro Piradão - Temporada 28 - ${ep.titulo}`;
            document.getElementById('playerDate').innerText = `Data de Estreia original: ${ep.lancamento}`;

            // Atualizar os botões de voltar/avançar conteúdo
            document.getElementById('prevBtn').disabled = (index === 0);
            document.getElementById('nextBtn').disabled = (index === episodios.length - 1);

            // Rola suavemente para o player começar a assistir
            document.getElementById('playerSection').scrollIntoView({ behavior: 'smooth' });
        }

        // NAVEGAR PELAS SETAS (ANTERIOR E PRÓXIMO)
        function navegarEp(direcao) {
            let novoIndex = indexAtual + direcao;
            if (novoIndex >= 0 && novoIndex < episodios.length) {
                carregarEpisodio(novoIndex);
            }
        }

        function scrollToEpisodes() {
            document.getElementById('listaEpisodiosTitulo').scrollIntoView({ behavior: 'smooth' });
        }

        // CONTROLE DO POP-UP COM PROCESSO INVERSO
        function fecharAviso(opcao) {
            const aviso = document.getElementById('caixaAviso');
            aviso.classList.add('subir-sumir');
            if(opcao === 'sim') {
                setTimeout(() => { alert('Show! Você será notificado dos novos episódios!'); }, 400);
            }
            setTimeout(() => { aviso.style.display = 'none'; }, 600);
        }
    </script>
</body>
</html>
