<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maloqueiro Piradão Online</title>
    <link rel="icon" href="https://i.ibb.co/zTXbHHxv/XRecorder-Edited-20260621-01.jpg" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0b0914; color: #fff; margin: 0; padding: 0; padding-bottom: 40px; -webkit-tap-highlight-color: transparent; }
        header { background-color: #0b0914; padding: 15px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; gap: 10px; }
        .btn-menu-linhas { background: none; border: none; color: #fff; font-size: 1.5rem; cursor: pointer; display: block !important; }
        .logo-central-branding { font-size: 1.25rem; font-weight: 900; color: #bc3bfb; text-shadow: 0px 0px 8px rgba(188, 59, 251, 0.6); font-style: italic; letter-spacing: 0.5px; cursor: pointer; white-space: nowrap; }
        
        .container-busca-topo { display: flex; align-items: center; background-color: #141125; border-radius: 6px; padding: 6px 10px; flex: 1; max-width: 220px; border: 1px solid #25213b; }
        .input-busca { background: none; border: none; color: white; outline: none; font-size: 0.95rem; width: 100%; }
        .btn-pesquisa-topo { background: none; border: none; color: #bc3bfb; font-size: 1.25rem; cursor: pointer; padding: 0 4px; display: flex; align-items: center; justify-content: center; }

        .container { max-width: 900px; margin: 0 auto; padding: 15px; box-sizing: border-box; }
        
        /* MENU LATERAL FIXADO */
        .menu-lateral { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background-color: #0b0914; box-shadow: 4px 0 15px rgba(0,0,0,0.7); z-index: 200; transition: left 0.3s ease; box-sizing: border-box; padding: 20px 15px; overflow-y: auto; }
        .menu-lateral.aberto { left: 0 !important; }
        .menu-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid #1c1a27; padding-bottom: 10px; }
        .menu-seccao-titulo { font-size: 0.85rem; font-weight: 800; color: #bc3bfb; letter-spacing: 1px; margin: 15px 0 5px 10px; display: block; text-transform: uppercase; }
        .menu-item-link { display: block; color: #fff; text-decoration: none; font-size: 1.05rem; font-weight: 600; padding: 10px 12px; border-radius: 4px; cursor: pointer; transition: background 0.2s; }
        .menu-item-link:hover { background-color: #141125; color: #bc3bfb; }
        .overlay-menu { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 150; display: none; }
        
        /* GERENCIADOR DE TELAS */
        .secao-layout { display: none !important; }
        .secao-layout.ativa { display: block !important; }
        
        .bloco-header-titulo { display: flex; justify-content: space-between; align-items: center; margin: 25px 0 15px 0; }
        .titulo-decorado { font-size: 1.2rem; font-weight: bold; color: #fff; border-left: 4px solid #bc3bfb; padding-left: 10px; }
        .texto-resultado-pesquisa { font-size: 1.1rem; font-weight: bold; color: #fff; margin: 15px 0 25px 0; border-left: 4px solid #bc3bfb; padding-left: 10px; }
        .btn-ver-mais { background-color: #8a63ff; color: white; border: none; padding: 8px 18px; border-radius: 4px; font-weight: bold; font-size: 0.8rem; cursor: pointer; }
        
        .container-resultado-pesquisa { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-top: 20px; }
        .card-resultado-anime { background-color: #110e1e; width: 210px; border-radius: 6px; padding: 10px; cursor: pointer; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .wrapper-imagem-resultado { position: relative; width: 100%; padding-top: 140%; background-color: #1c1a27; border-radius: 4px; overflow: hidden; }
        .wrapper-imagem-resultado img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .titulo-resultado-anime { font-size: 1.1rem; font-weight: bold; margin: 12px 0 4px 0; color: #fff; }

        .container-poster-destaque { display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 20px 0; cursor: pointer; }
        .poster-principal-imagem { width: 210px; border-radius: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .legenda-poster-clique { margin-top: 12px; font-size: 1.1rem; font-weight: bold; color: #fff; }
        
        .grid-ultimos-episodios { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 15px; }
        .card-episodio-home { cursor: pointer; display: flex; flex-direction: column; background-color: #110e1e; padding: 8px; border-radius: 6px; }
        .thumb-wrapper-home { position: relative; width: 100%; padding-top: 56.25%; background-color: #1c1a27; border-radius: 4px; overflow: hidden; }
        .thumb-wrapper-home img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .tag-legendado-home { position: absolute; bottom: 6px; right: 6px; background-color: #8a63ff; color: white; font-size: 0.65rem; font-weight: bold; padding: 3px 8px; border-radius: 3px; }
        
        .bloco-seletor-temporada { display: flex; background-color: #141125; margin-bottom: 3px; border-radius: 4px 4px 0 0; }
        .numero-temporada-box { background-color: #8a63ff; color: #fff; font-size: 1.5rem; font-weight: bold; width: 80px; display: flex; align-items: center; justify-content: center; padding: 12px 0; }
        .texto-temporada-box { color: #fff; font-size: 1.1rem; display: flex; align-items: center; padding-left: 20px; flex: 1; font-weight: bold; }
        .bloco-lista-completa { display: flex; flex-direction: column; background-color: #110e1e; border-radius: 0 0 4px 4px; overflow: hidden; }
        .item-episodio { display: flex; align-items: center; padding: 12px 10px; border-bottom: 1px solid #1c1a27; cursor: pointer; gap: 15px; }
        .capa-miniatura-ep { width: 90px; height: 52px; object-fit: cover; border-radius: 3px; }
        .ep-identificador { color: #bc3bfb; font-size: 0.95rem; font-weight: bold; min-width: 55px; }
        .ep-divisor-vertical { width: 1px; height: 30px; background-color: #25213b; }
        
        .wrapper-video-player { position: relative; width: 100%; padding-top: 56.25%; background-color: #000; border-radius: 8px; overflow: hidden; margin-top: 15px; }
        .wrapper-video-player iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .botoes-navegacao-player { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
        .btn-seta-roxa { background-color: #8a63ff; color: #fff; border: none; padding: 12px 24px; font-size: 1.1rem; font-weight: bold; border-radius: 6px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .btn-seta-roxa:disabled { background-color: #1f1a3a; color: #555; cursor: not-allowed; }
        .btn-voltar-topo { background: none; border: none; color: #fff; font-size: 1.2rem; cursor: pointer; display: inline-flex; align-items: center; gap: 10px; margin-bottom: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="overlay-menu" id="overlayMenu" onclick="fecharMenuLateral()"></div>

    <div class="menu-lateral" id="menuLateralContainer">
        <div class="menu-header">
            <span style="font-weight: 900; color: #bc3bfb;">MENU</span>
            <button class="btn-menu-linhas" onclick="fecharMenuLateral()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        
        <div class="menu-item-link" onclick="resetarHome()"><i class="fa-solid fa-house" style="margin-right: 8px;"></i> Início</div>
        
        <span class="menu-seccao-titulo">Listas Especiais</span>
        <div class="menu-item-link" onclick="carregaEpsMaisAssistidos()"><i class="fa-solid fa-eye" style="margin-right: 8px;"></i> Mais Assistidos</div>
        <div class="menu-item-link" onclick="carregaEpsHypados()"><i class="fa-solid fa-bolt" style="margin-right: 8px;"></i> Hypados</div>
        <div class="menu-item-link" onclick="carregaEpsRanking()"><i class="fa-solid fa-trophy" style="margin-right: 8px;"></i> Ranking</div>
        <div class="menu-item-link" onclick="carregaEpsMenosAssistidos()"><i class="fa-solid fa-arrow-down-short-wide" style="margin-right: 8px;"></i> Menos Assistidos</div>
    </div>

    <header>
        <button class="btn-menu-linhas" onclick="abrirMenuLateral()"><i class="fa-solid fa-bars"></i></button>
        <div class="logo-central-branding" onclick="resetarHome()">Maloqueiro Piradão Online</div>
        
        <div class="container-busca-topo">
            <input type="text" id="inputBuscarAnime" class="input-busca" placeholder="Buscar..." onkeydown="if(event.key === 'Enter') executarPesquisa()">
            <button class="btn-pesquisa-topo" onclick="executarPesquisa()"><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>
    </header>

    <div class="container">

        <section id="telaResultadoBusca" class="secao-layout">
            <button class="btn-voltar-topo" onclick="resetarHome()"><i class="fa-solid fa-arrow-left"></i> Voltar</button>
            <div id="mensagemBusca" class="texto-resultado-pesquisa"></div>
            <div class="container-resultado-pesquisa">
                <div class="card-resultado-anime" onclick="cliqueVerMais()">
                    <div class="wrapper-imagem-resultado">
                        <img src="https://i.ibb.co/RT5Zkxr0/1782073076111.png" alt="Pôster Maloqueiro Piradão">
                    </div>
                    <h3 class="titulo-resultado-anime">Maloqueiro Piradão</h3>
                    <span style="font-size: 0.8rem; color: #bc3bfb; font-weight: bold;">Clique para ver os episódios</span>
                </div>
            </div>
        </section>

        <section id="telaHome" class="secao-layout ativa">
            <div class="bloco-header-titulo">
                <div class="titulo-decorado">Maloqueiro Piradão</div>
                <button class="btn-ver-mais" onclick="cliqueVerMais()">VER MAIS</button>
            </div>
            <div class="container-poster-destaque" onclick="cliqueVerMais()">
                <img src="https://i.ibb.co/RT5Zkxr0/1782073076111.png" class="poster-principal-imagem">
                <div class="legenda-poster-clique">Maloqueiro Piradão - Temporada 1</div>
            </div>
            <div class="bloco-header-titulo">
                <div class="titulo-decorado">Últimos Episódios</div>
            </div>
            <div id="gridUltimosEpsContainer" class="grid-ultimos-episodios"></div>
        </section>

        <section id="telaListaEps" class="secao-layout">
            <button class="btn-voltar-topo" onclick="resetarHome()"><i class="fa-solid fa-arrow-left"></i> Voltar</button>
            <div class="bloco-header-titulo">
                <div class="titulo-decorado" id="tituloSecaoDinamica">Episódios</div>
            </div>
            <div class="bloco-seletor-temporada"><div class="numero-temporada-box">1</div><div class="texto-temporada-box" id="subtituloTemporadaBox">Temporada Completa</div></div>
            <div class="bloco-lista-completa" id="listaDeEpisodiosContainer"></div>
        </section>

        <section id="telaPlayer" class="secao-layout">
            <button class="btn-voltar-topo" onclick="voltarParaListaOrigem()"><i class="fa-solid fa-arrow-left"></i> Voltar</button>
            <h2 id="tituloVideoAtual" style="font-size: 1.2rem; border-left: 4px solid #bc3bfb; padding-left: 10px;">Assistindo</h2>
            <div class="wrapper-video-player"><iframe id="iframeVideo" src="" allowfullscreen></iframe></div>
            <div class="botoes-navegacao-player">
                <button id="btnEpAnterior" class="btn-seta-roxa" onclick="mudarEpisodioNavegacao(-1)"><i class="fa-solid fa-arrow-left"></i> Anterior</button>
                <button id="btnEpProximo" class="btn-seta-roxa" onclick="mudarEpisodioNavegacao(1)">Próximo <i class="fa-solid fa-arrow-right"></i></button>
            </div>
        </section>
    </div>

    <script>
        let indexEpisodioAtual = 0;
        let telaOrigemPlayer = 'telaListaEps';
        const todosEpisodios = [];
        
        const idsBaseAntiga = ["sk38dxNjJxY", "-hBlNzGUGIg", "orECJ_S0S3Q", "fPg26mBmDOg", "y1iZJ0yKLog", "Q9wx7co0_vs", "QPvq4qTiq78", "QN-apW9BKHY", "TNW6z_fw-2s", "fPPmk10cDp4"];
        const idsReaisNovos = {
            73: "mrdFRdIDexk", 74: "Imj7TrxsIyQ", 75: "B9irfxkg_nQ", 76: "n5bYYnXQ3h4", 77: "MGoJx5W7kNY",
            78: "bJtdeeAapEo", 79: "38-s24wY1bA", 80: "miXvQoqUQL0", 81: "Wg8Fkt66bao", 82: "ThTL68D2z_o",
            83: "CgmGKEaEg0c", 84: "sq4xtislABE", 85: "trCqR7Dkpz4", 86: "sLiwPG7dqw4", 87: "0JvTZtdnplw",
            88: "pH46bkM9beE", 89: "4_L-s4fjscs", 90: "-I7HuWOsQuA", 91: "D9iIlFEw8jQ", 92: "-2TQmmP_HGU",
            93: "-g0zrFjMiVE", 94: "OdM1Tx_KRsc", 95: "wBkLYveQvsA", 96: "al4S3k_ORnE", 97: "v5JuQbCCZf0",
            98: "wyhe-8SL0zo", 99: "jp-dZkATmOA", 100: "2LqfUwWJ9sM", 101: "wdFaSEhQIO0", 102: "Bj5N65DK1vo",
            103: "d-jbTPTc91k"
        };

        for (let i = 1; i <= 103; i++) {
            let idVideo = i >= 73 ? idsReaisNovos[i] : idsBaseAntiga[(i - 1) % idsBaseAntiga.length];
            todosEpisodios.push({
                ep: i,
                id: idVideo,
                data: i >= 73 ? "27 de junho de 2026" : "13 de abril de 2024"
            });
        }

        window.addEventListener('DOMContentLoaded', () => {
            gerarUltimosEpisodiosHome();
        });

        function navegarPara(idTela) {
            document.querySelectorAll('.secao-layout').forEach(t => t.classList.remove('ativa'));
            document.getElementById(idTela).classList.add('ativa');
            if (idTela !== 'telaPlayer') document.getElementById('iframeVideo').src = "";
            fecharMenuLateral();
            window.scrollTo(0, 0);
        }

        function abrirMenuLateral() {
            document.getElementById('menuLateralContainer').classList.add('aberto');
            document.getElementById('overlayMenu').style.display = 'block';
        }

        function fecharMenuLateral() {
            document.getElementById('menuLateralContainer').classList.remove('aberto');
            document.getElementById('overlayMenu').style.display = 'none';
        }

        function gerarUltimosEpisodiosHome() {
            const container = document.getElementById('gridUltimosEpsContainer');
            container.innerHTML = "";
            for (let i = 102; i >= 95; i--) {
                const item = todosEpisodios[i];
                container.innerHTML += `
                    <div class="card-episodio-home" onclick="carregarEpisodioPlayer(${i}, 'telaHome')">
                        <div class="thumb-wrapper-home">
                            <img src="https://i.ibb.co/RT5Zkxr0/1782073076111.png">
                            <span class="tag-legendado-home">Legendado</span>
                        </div>
                        <div style="margin-top:8px; padding:0 4px;">
                            <h3 style="font-size:0.9rem; font-weight:bold; margin:0;">Maloqueiro Piradão</h3>
                            <p style="font-size:0.85rem; color:#aaa; margin:3px 0 0 0;">Episódio ${item.ep}</p>
                        </div>
                    </div>`;
            }
        }

        function carregarListaNaTela(arrayDados) {
            const containerLista = document.getElementById('listaDeEpisodiosContainer');
            containerLista.innerHTML = "";
            arrayDados.forEach((item) => {
                let realIndex = todosEpisodios.findIndex(e => e.ep === item.ep);
                containerLista.innerHTML += `
                    <div class="item-episodio" onclick="carregarEpisodioPlayer(${realIndex}, 'telaListaEps')">
                        <img src="https://i.ibb.co/RT5Zkxr0/1782073076111.png" class="capa-miniatura-ep">
                        <div class="ep-identificador">Ep - ${item.ep}</div>
                        <div class="ep-divisor-vertical"></div>
                        <div style="display:flex; flex-direction:column; gap:4px;">
                            <span style="color:#fff; font-size:0.95rem; font-weight:bold;">Maloqueiro Piradão Episódio ${item.ep}</span>
                            <span style="color:#666; font-size:0.8rem;">${item.data}</span>
                        </div>
                    </div>`;
            });
        }

        function executarPesquisa() {
            const termoBusca = document.getElementById('inputBuscarAnime').value.trim();
            const msgBox = document.getElementById('mensagemBusca');
            
            if (termoBusca !== "" && !isNaN(termoBusca)) {
                const resultadosFiltrados = todosEpisodios.filter(item => item.ep.toString() === termoBusca);
                if(resultadosFiltrados.length > 0) {
                    document.getElementById('tituloSecaoDinamica').innerText = "Resultados Encontrados";
                    document.getElementById('subtituloTemporadaBox').innerText = "Resultados da Pesquisa";
                    carregarListaNaTela(resultadosFiltrados);
                    navegarPara('telaListaEps');
                    return;
                }
            }

            msgBox.innerHTML = `Você pesquisou por: <span style="color: #bc3bfb;">Maloqueiro Piradão</span>`;
            navegarPara('telaResultadoBusca');
        }

        function cliqueVerMais() {
            document.getElementById('tituloSecaoDinamica').innerText = "Episódios";
            document.getElementById('subtituloTemporadaBox').innerText = "Temporada Completa";
            carregarListaNaTela(todosEpisodios);
            navegarPara('telaListaEps');
        }

        function carregaEpsMaisAssistidos() {
            const maisAssistidos = todosEpisodios.filter(item => [2, 25, 74, 89, 98, 102].includes(item.ep));
            document.getElementById('tituloSecaoDinamica').innerText = "Mais Assistidos";
            document.getElementById('subtituloTemporadaBox').innerText = "Recorde de Visualizações";
            carregarListaNaTela(maisAssistidos);
            navegarPara('telaListaEps');
        }

        function carregaEpsHypados() {
            const hypados = todosEpisodios.filter(item => [73, 80, 85, 90, 96, 100].includes(item.ep));
            document.getElementById('tituloSecaoDinamica').innerText = "Episódios Hypados";
            document.getElementById('subtituloTemporadaBox').innerText = "Maior Expectativa da Comunidade";
            carregarListaNaTela(hypados);
            navegarPara('telaListaEps');
        }

        function carregaEpsRanking() {
            const ranking = todosEpisodios.filter(item => [1, 50, 77, 95, 103].includes(item.ep));
            document.getElementById('tituloSecaoDinamica').innerText = "Ranking da Série";
            document.getElementById('subtituloTemporadaBox').innerText = "Top Avaliados";
            carregarListaNaTela(ranking);
            navegarPara('telaListaEps');
        }

        function carregaEpsMenosAssistidos() {
            const menosAssistidos = todosEpisodios.filter(item => [3, 12, 18, 22, 35, 48].includes(item.ep));
            document.getElementById('tituloSecaoDinamica').innerText = "Menos Assistidos";
            document.getElementById('subtituloTemporadaBox').innerText = "Capítulos de Transição";
            carregarListaNaTela(menosAssistidos);
            navegarPara('telaListaEps');
        }

        function carregarEpisodioPlayer(index, origem)
