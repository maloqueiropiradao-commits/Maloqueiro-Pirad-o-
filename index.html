<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maloqueiro Piradão - Animes Online</title>
    <link rel="icon" href="https://i.ibb.co/zTXbHHxv/XRecorder-Edited-20260621-01.jpg" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0b0914; color: #fff; margin: 0; padding: 0; padding-bottom: 40px; -webkit-tap-highlight-color: transparent; }
        header { background-color: #0b0914; padding: 15px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; gap: 10px; }
        .btn-menu-linhas { background: none; border: none; color: #fff; font-size: 1.5rem; cursor: pointer; }
        .logo-central-branding { font-size: 1.4rem; font-weight: 900; color: #bc3bfb; text-shadow: 0px 0px 8px rgba(188, 59, 251, 0.6); font-style: italic; letter-spacing: 1px; cursor: pointer; }
        .container-busca-topo { display: flex; align-items: center; background-color: #141125; border-radius: 4px; padding: 4px 8px; flex: 1; max-width: 250px; }
        .input-busca { background: none; border: none; color: white; outline: none; font-size: 0.9rem; width: 100%; }
        .btn-pesquisa-topo { background: none; border: none; color: #bc3bfb; font-size: 1.1rem; cursor: pointer; }
        .barra-alfabetica { display: flex; gap: 22px; padding: 10px 15px; overflow-x: auto; border-bottom: 1px solid #141125; scrollbar-width: none; }
        .letra-filtro { color: #6a5d93; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
        .letra-filtro.ativa { color: #bc3bfb; border-bottom: 3px solid #bc3bfb; padding-bottom: 2px; }
        .container { max-width: 900px; margin: 0 auto; padding: 15px; box-sizing: border-box; }
        .secao-layout { display: none; }
        .secao-layout.ativa { display: block; }
        .bloco-header-titulo { display: flex; justify-content: space-between; align-items: center; margin: 25px 0 15px 0; }
        .titulo-decorado { font-size: 1.2rem; font-weight: bold; color: #fff; border-left: 4px solid #bc3bfb; padding-left: 10px; }
        .btn-ver-mais { background-color: #8a63ff; color: white; border: none; padding: 6px 16px; border-radius: 4px; font-weight: bold; font-size: 0.75rem; cursor: pointer; }
        .container-poster-destaque { display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 20px 0; cursor: pointer; }
        .poster-principal-imagem { width: 210px; border-radius: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .legenda-poster-clique { margin-top: 12px; font-size: 1.1rem; font-weight: bold; color: #fff; }
        .grid-ultimos-episodios { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 15px; }
        .card-episodio-home { cursor: pointer; display: flex; flex-direction: column; }
        .thumb-wrapper-home { position: relative; width: 100%; padding-top: 56.25%; background-color: #1c1a27; border-radius: 4px; overflow: hidden; }
        .thumb-wrapper-home img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .tag-legendado-home { position: absolute; bottom: 6px; right: 6px; background-color: #8a63ff; color: white; font-size: 0.65rem; font-weight: bold; padding: 3px 8px; border-radius: 3px; }
        .info-card-home { text-align: center; margin-top: 8px; }
        .info-card-home .anime-nome { font-size: 0.9rem; font-weight: bold; margin: 0; }
        .info-card-home .ep-numero { font-size: 0.85rem; color: #aaa; margin: 3px 0 0 0; }
        .texto-resultado-pesquisa { font-size: 1.1rem; color: #fff; margin-bottom: 25px; border-left: 4px solid #bc3bfb; padding-left: 10px; }
        .texto-resultado-pesquisa span { color: #8a63ff; font-weight: bold; }
        .container-lista-pesquisa { display: flex; flex-direction: column; gap: 15px; }
        .resultado-item-linha { display: flex; align-items: center; gap: 15px; cursor: pointer; background-color: #110e1e; padding: 10px; border-radius: 6px; }
        .resultado-capa-mini { width: 70px; height: 100px; object-fit: cover; border-radius: 4px; }
        .resultado-info-texto { display: flex; flex-direction: column; gap: 5px; }
        .resultado-titulo-anime { font-size: 1.1rem; font-weight: bold; color: #fff; }
        .resultado-estrela-nota { color: #f39c12; font-size: 0.9rem; display: flex; align-items: center; gap: 5px; }
        .btn-voltar-topo { background: none; border: none; color: #fff; font-size: 1.4rem; cursor: pointer; display: inline-flex; align-items: center; gap: 10px; margin-bottom: 20px; font-weight: bold; }
        .bloco-seletor-temporada { display: flex; background-color: #181818; margin-bottom: 3px; }
        .numero-temporada-box { background-color: #8a63ff; color: #fff; font-size: 1.8rem; font-weight: bold; width: 90px; display: flex; align-items: center; justify-content: center; padding: 15px 0; }
        .texto-temporada-box { color: #999; font-size: 1.1rem; display: flex; align-items: center; padding-left: 20px; flex: 1; }
        .bloco-lista-completa { display: flex; flex-direction: column; background-color: #000; }
        .item-episodio { display: flex; align-items: center; padding: 12px 10px; border-bottom: 1px solid #1c1c1c; cursor: pointer; gap: 15px; }
        .capa-miniatura-ep { width: 100px; height: 58px; object-fit: cover; }
        .ep-identificador { color: #aaa; font-size: 1rem; font-weight: bold; min-width: 50px; }
        .ep-divisor-vertical { width: 1px; height: 35px; background-color: #333; }
        .ep-dados-conteudo { display: flex; flex-direction: column; gap: 4px; }
        .ep-titulo-link { color: #fff; font-size: 0.95rem; font-weight: bold; text-decoration: underline; }
        .ep-data-estreia { color: #666; font-size: 0.8rem; }
        .wrapper-video-player { position: relative; width: 100%; padding-top: 56.25%; background-color: #000; border-radius: 8px; overflow: hidden; margin-top: 15px; }
        .wrapper-video-player iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* CONTROLADORES DE EPISÓDIO ROXOS (SETA ESQUERDA E DIREITA) */
        .botoes-navegacao-player {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding: 0 5px;
        }
        .btn-seta-roxa {
            background-color: #8a63ff;
            color: #fff;
            border: none;
            padding: 12px 24px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.2s;
        }
        .btn-seta-roxa:hover { background-color: #bc3bfb; }
        .btn-seta-roxa:disabled { background-color: #1f1a3a; color: #555; cursor: not-allowed; }
    </style>
</head>
<body>

    <header>
        <button class="btn-menu-linhas" onclick="navegarPara('telaListaEps')"><i class="fa-solid fa-bars"></i></button>
        <div class="logo-central-branding" onclick="navegarPara('telaHome')">MALOQUEIRO PIRADÃO</div>
        <div class="container-busca-topo">
            <input type="text" id="inputBuscarAnime" class="input-busca" placeholder="Buscar..." onkeypress="verificarEnterBusca(event)">
            <button class="btn-pesquisa-topo" onclick="executarBuscaSite()"><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>
    </header>

    <div class="container">

        <section id="telaHome" class="secao-layout ativa">
            <div class="bloco-header-titulo">
                <div class="titulo-decorado">MALOQUEIRO PIRADÃO</div>
                <button class="btn-ver-mais" onclick="navegarPara('telaListaEps')">VER MAIS</button>
            </div>
            <div class="container-poster-destaque" onclick="navegarPara('telaListaEps')">
                <img src="https://i.ibb.co/RT5Zkxr0/1782073076111.png" class="poster-principal-imagem">
                <div class="legenda-poster-clique">Maloqueiro Piradão</div>
            </div>
            <div class="bloco-header-titulo"><div class="titulo-decorado">Últimos Episódios</div></div>
            <div class="grid-ultimos-episodios">
                <div class="card-episodio-home" onclick="carregarEpisodioPorIndex(4)">
                    <div class="thumb-wrapper-home"><img src="https://i.ibb.co/RT5Zkxr0/1782073076111.png"><span class="tag-legendado-home">Legendado</span></div>
                    <div class="info-card-home"><h3 class="anime-nome">Maloqueiro Piradão</h3><p class="ep-numero">Episódio 41</p></div>
                </div>
                <div class="card-episodio-home" onclick="carregarEpisodioPorIndex(listaEpisodiosDados.length - 1)">
                    <div class="thumb-wrapper-home"><img src="https://i.ibb.co/RT5Zkxr0/1782073076111.png"><span class="tag-legendado-home">Legendado</span></div>
                    <div class="info-card-home"><h3 class="anime-nome">Maloqueiro Piradão</h3><p class="ep-numero">Episódio 72</p></div>
                </div>
            </div>
        </section>

        <section id="telaResultadoBusca" class="secao-layout">
            <div class="texto-resultado-pesquisa">Você pesquisou por: <span id="termoPesquisadoAlvo">"Maloqueiro Piradão"</span></div>
            <div id="containerResultadosEncontrados" class="container-lista-pesquisa"></div>
        </section>

        <section id="telaListaEps" class="secao-layout">
            <button class="btn-voltar-topo" onclick="navegarPara('telaHome')"><i class="fa-solid fa-arrow-left"></i> Voltar para o Início</button>
            <div class="bloco-seletor-temporada"><div class="numero-temporada-box">1</div><div class="texto-temporada-box">Temporada 1</div></div>
            <div class="bloco-lista-completa" id="listaDeEpisodiosContainer"></div>
        </section>

        <section id="telaPlayer" class="secao-layout">
            <button class="btn-voltar-topo" onclick="navegarPara('telaListaEps')"><i class="fa-solid fa-arrow-left"></i> Voltar para a Lista</button>
            <h2 id="tituloVideoAtual" style="font-size: 1.2rem; border-left: 4px solid #bc3bfb; padding-left: 10px;">Assistindo</h2>
            
            <div class="wrapper-video-player">
                <iframe id="iframeVideo" src="" allowfullscreen></iframe>
            </div>

            <div class="botoes-navegacao-player">
                <button id="btnEpAnterior" class="btn-seta-roxa" onclick="mudarEpisodioNavegacao(-1)">
                    <i class="fa-solid fa-arrow-left"></i> Anterior
                </button>
                <button id="btnEpProximo" class="btn-seta-roxa" onclick="mudarEpisodioNavegacao(1)">
                    Próximo <i class="fa-solid fa-arrow-right"></i>
                </button>
            </div>
        </section>

    </div>

    <script>
        let indexEpisodioAtual = 0;

        const listaEpisodiosDados = [
            { ep: 1, id: "sk38dxNjJxY", data: "13 de abril de 2024" },
            { ep: 2, id: "-hBlNzGUGIg", data: "14 de abril de 2024" },
            { ep: 3, id: "orECJ_S0S3Q", data: "15 de abril de 2024" },
            { ep: 4, id: "fPg26mBmDOg", data: "16 de abril de 2024" },
            { ep: 41, id: "fuMYbWdAk8Y", data: "26 de junho de 2026" },
            { ep: 42, id: "jAXNnal6oGY", data: "26 de junho de 2026" },
            { ep: 43, id: "dHbZFPUnmlU", data: "26 de junho de 2026" },
            { ep: 44, id: "pF4wyFxXz2E", data: "26 de junho de 2026" },
            { ep: 45, id: "geDBhVvgRNU", data: "26 de junho de 2026" },
            { ep: 46, id: "fRVra3Q3rec", data: "26 de junho de 2026" },
            { ep: 47, id: "N0iUHPfj0ss", data: "26 de junho de 2026" },
            { ep: 48, id: "Aq4jhIcPntw", data: "26 de junho de 2026" },
            { ep: 49, id: "-5xq-xey7bA", data: "26 de junho de 2026" },
            { ep: 50, id: "rgRdD4Fa4kc", data: "26 de junho de 2026" },
            { ep: 51, id: "l88UFJvMYw4", data: "26 de junho de 2026" },
            { ep: 52, id: "OA_Ckkts2-4", data: "26 de junho de 2026" },
            { ep: 53, id: "3vpMFA-K-hs", data: "26 de junho de 2026" },
            { ep: 54, id: "U6YP57H2gY0", data: "26 de junho de 2026" },
            { ep: 55, id: "gt8XU6GKvq4", data: "26 de junho de 2026" },
            { ep: 56, id: "lAZRgaJ_g3c", data: "26 de junho de 2026" },
            { ep: 57, id: "oAZewCCeMXQ", data: "26 de junho de 2026" },
            { ep: 58, id: "WMPrkMzTe8o", data: "26 de junho de 2026" },
            { ep: 59, id: "2V219Bqngjw", data: "26 de junho de 2026" },
            { ep: 60, id: "rmyGnPAEdno", data: "26 de junho de 2026" },
            { ep: 61, id: "nHT7Qgzcla8", data: "26 de junho de 2026" },
            { ep: 62, id: "YCnEnLKWGC8", data: "26 de junho de 2026" },
            { ep: 63, id: "md1rYTJ7S_g", data: "26 de junho de 2026" },
            { ep: 64, id: "yyKp6ixBbb8", data: "26 de junho de 2026" },
            { ep: 65, id: "gwRAO-63pQM", data: "26 de junho de 2026" },
            { ep: 66, id: "0BN1IN8S4A8", data: "26 de junho de 2026" },
            { ep: 67, id: "e8FKpK2iGwg", data: "26 de junho de 2026" },
            { ep: 68, id: "3a1nNLSZTHY", data: "26 de junho de 2026" },
            { ep: 69, id: "NkuosQ8THUU", data: "26 de junho de 2026" },
            { ep: 70, id: "IR_G3I6QSXs", data: "26 de junho de 2026" },
            { ep: 71, id: "3Uj7awV5oi0", data: "26 de junho de 2026" },
            { ep: 72, id: "QTeunNuI0NM", data: "26 de junho de 2026" }
        ];

        // Monta a lista completa
        const containerLista = document.getElementById('listaDeEpisodiosContainer');
        listaEpisodiosDados.forEach((item, index) => {
            containerLista.innerHTML += `
                <div class="item-episodio" onclick="carregarEpisodioPorIndex(${index})">
                    <img src="https://i.ibb.co/RT5Zkxr0/1782073076111.png" class="capa-miniatura-ep">
                    <div class="ep-identificador">Ep - ${item.ep}</div>
                    <div class="ep-divisor-vertical"></div>
                    <div class="ep-dados-conteudo"><span class="ep-titulo-link">Episodio ${item.ep}</span><span class="ep-data-estreia">${item.data}</span></div>
                </div>`;
        });

        function navegarPara(idTela) {
            document.querySelectorAll('.secao-layout').forEach(t => t.classList.remove('ativa'));
            document.getElementById(idTela).classList.add('ativa');
            if (idTela !== 'telaPlayer') document.getElementById('iframeVideo').src = "";
            window.scrollTo(0, 0);
        }

        // CONTROLADOR DE ATUALIZAÇÃO DO PLAYER REFRESH-FREE
        function carregarEpisodioPorIndex(index) {
            indexEpisodioAtual = index;
            const objEp = listaEpisodiosDados[index];
            
            navegarPara('telaPlayer');
            document.getElementById('tituloVideoAtual').innerText = `Maloqueiro Piradão - Episódio ${objEp.ep}`;
            document.getElementById('iframeVideo').src = `https://www.youtube.com/embed/${objEp.id}?autoplay=1`;
            
            // Habilita ou desabilita as setas se for o primeiro ou último ep
            document.getElementById('btnEpAnterior').disabled = (index === 0);
            document.getElementById('btnEpProximo').disabled = (index === listaEpisodiosDados.length - 1);
        }

        // FUNÇÃO DE TROCA COM AS SETAS
        function mudarEpisodioNavegacao(direcao) {
            let novoIndex = indexEpisodioAtual + direcao;
            if (novoIndex >= 0 && novoIndex < listaEpisodiosDados.length) {
                carregarEpisodioPorIndex(novoIndex);
            }
        }

        function executarBuscaSite() {
            const termoInput = document.getElementById('inputBuscarAnime').value.trim();
            if(termoInput === "") return;

            document.getElementById('termoPesquisadoAlvo').innerText = `"${termoInput}"`;
            const containerResultados = document.getElementById('containerResultadosEncontrados');
            
            if(termoInput.toLowerCase().includes("maloqueiro") || termoInput.toLowerCase().includes("piradão") || termoInput.toLowerCase().includes("anime")) {
                containerResultados.innerHTML = `
                    <div class="resultado-item-linha" onclick="navegarPara('telaListaEps')">
                        <img src="https://i.ibb.co/RT5Zkxr0/1782073076111.png" class="resultado-capa-mini">
                        <div class="resultado-info-texto">
                            <div class="resultado-titulo-anime">Maloqueiro Piradão</div>
                            <div class="resultado-estrela-nota"><i class="fa-solid fa-star"></i> 8.5</div>
                        </div>
                    </div>`;
            } else {
                containerResultados.innerHTML = `<p style="color: #666; padding-left:10px;">Nenhum resultado encontrado.</p>`;
            }
            navegarPara('telaResultadoBusca');
        }

        function verificarEnterBusca(e) { if (e.key === 'Enter') executarBuscaSite(); }
    </script>
</body>
</html>
